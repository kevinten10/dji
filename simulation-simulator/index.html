<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI 3D无人机模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            overflow: hidden;
        }
        #backBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,212,255,0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }
        #backBtn:hover { background: #00ff88; transform: scale(1.05); }
        #container { width: 100vw; height: 100vh; }
        #info {
            position: absolute; top: 70px; left: 20px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 15px; border-radius: 12px; font-size: 13px;
            max-width: 260px; z-index: 100;
        }
        #info h1 { font-size: 16px; margin-bottom: 10px; color: #00d4ff; }
        #info p { margin-bottom: 6px; line-height: 1.4; }
        #info .key {
            display: inline-block; background: rgba(255,255,255,0.2);
            padding: 2px 6px; border-radius: 3px; font-family: monospace;
        }
        #telemetry {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.8); color: #00ff88;
            padding: 12px; border-radius: 12px;
            font-family: 'Courier New', monospace; font-size: 12px; z-index: 100;
        }
        #telemetry div { margin: 4px 0; }
        #error {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(255,0,0,0.3); padding: 30px; border-radius: 12px;
            color: #fff; text-align: center; display: none;
        }
        #error h2 { color: #ff6b6b; margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="/" id="backBtn">← 返回首页</a>
    <div id="container"></div>
    
    <div id="info">
        <h1>🚁 3D无人机模拟器</h1>
        <p><span class="key">W</span><span class="key">S</span> 上升/下降</p>
        <p><span class="key">A</span><span class="key">D</span> 左旋/右旋</p>
        <p><span class="key">↑</span><span class="key">↓</span> 前进/后退</p>
        <p><span class="key">←</span><span class="key">→</span> 左移/右移</p>
        <p><span class="key">R</span> 重置位置</p>
        <p style="margin-top:8px;color:#888">鼠标拖拽旋转视角</p>
    </div>
    
    <div id="telemetry">
        <div>高度: <span id="altitude">0.0</span> m</div>
        <div>速度: <span id="speed">0.0</span> m/s</div>
    </div>
    
    <div id="error">
        <h2>加载失败</h2>
        <p>Three.js库加载失败，请检查网络后刷新重试</p>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="main.js"></script>
</body>
</html>
