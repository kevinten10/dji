<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机躲避挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
        }
        #ui .stat {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }
        #ui .score {
            color: #00ff88;
        }
        #ui .level {
            color: #00d4ff;
        }
        #ui .lives {
            color: #ff6b6b;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            backdrop-filter: blur(5px);
        }
        #gameOverScreen {
            display: none;
        }
        h1 {
            color: #00d4ff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .subtitle {
            color: #888;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .btn {
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            color: #000;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        .instructions {
            color: #666;
            margin-top: 30px;
            text-align: center;
            line-height: 1.8;
        }
        .instructions span {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 6px;
            margin: 0 4px;
            font-family: monospace;
        }
        #finalScore {
            font-size: 72px;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }
        #droneIcon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="stat score">分数: <span id="scoreDisplay">0</span></div>
            <div class="stat level">等级: <span id="levelDisplay">1</span></div>
            <div class="stat lives">生命: <span id="livesDisplay">❤️❤️❤️</span></div>
        </div>
        
        <div id="startScreen">
            <div id="droneIcon">🚁</div>
            <h1>无人机躲避挑战</h1>
            <p class="subtitle">操控无人机躲避障碍物，看看能飞多远！</p>
            <button class="btn" id="startBtn">开始飞行</button>
            <div class="instructions">
                <p><span>↑</span><span>↓</span><span>←</span><span>→</span> 方向键控制移动</p>
                <p>或使用 <span>W</span><span>A</span><span>S</span><span>D</span> 键</p>
            </div>
        </div>
        
        <div id="gameOverScreen">
            <h1>飞行结束</h1>
            <p class="subtitle">最终得分</p>
            <div id="finalScore">0</div>
            <button class="btn" id="restartBtn">再来一次</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
