<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI 无人机项目</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 { font-size: 48px; margin-bottom: 10px; color: #00d4ff; }
        .subtitle { color: #888; font-size: 18px; margin-bottom: 40px; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        .card h2 { font-size: 24px; margin-bottom: 10px; color: #00ff88; }
        .card p { color: #aaa; font-size: 14px; }
        .emoji { font-size: 40px; margin-bottom: 15px; }
        .github-link {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
        }
        .github-link a { color: #00d4ff; text-decoration: none; }
        .github-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="emoji">🚁</div>
    <h1>DJI 无人机项目</h1>
    <p class="subtitle">探索无人机的无限可能！</p>
    
    <div class="links">
        <a href="simulation-simulator/index.html" class="card">
            <h2>🎮 3D无人机模拟器</h2>
            <p>在浏览器中体验真实飞行！支持WASD控制、鼠标旋转视角</p>
        </a>
        
        <a href="games/drone-game/index.html" class="card">
            <h2>🚀 无人机躲避游戏</h2>
            <p>操控无人机躲避障碍物，看你能飞多远！</p>
        </a>
    </div>
    
    <p class="github-link">
        📚 完整文档：<a href="https://github.com/kevinten10/dji#readme">GitHub README</a>
    </p>
</body>
</html>
